version: '3.8'

services:
  mysql:
    image: mariadb:10.11
    container_name: pm-mysql-prod
    ports:
      - '3307:3306'
    environment:
      MARIADB_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MARIADB_DATABASE: ${DATABASE_NAME}
    volumes:
      - mysql_prod_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$$MARIADB_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pm-redis-prod
    volumes:
      - redis_prod_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pm-server-prod
    ports:
      - '5000:5000'
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_URL: "mysql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}"
      REDIS_URL: "redis://redis:6379"
      CLIENT_URL: "http://localhost"
    command: sh -c "npx prisma migrate deploy && node index.js"
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: pm-client-prod
    ports:
      - '80:80'
    restart: always
    depends_on:
      - server

volumes:
  mysql_prod_data:
  redis_prod_data:
