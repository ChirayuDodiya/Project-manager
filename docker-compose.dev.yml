version: '3.8'

services:
  mysql:
    image: mariadb:10.11
    container_name: pm-mysql-dev
    ports:
      - '3307:3306'
    environment:
      MARIADB_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MARIADB_DATABASE: ${DATABASE_NAME}
    volumes:
      - mysql_dev_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$$MARIADB_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pm-redis-dev
    ports:
      - '6379:6379'
    volumes:
      - redis_dev_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mysql_dev_data:
  redis_dev_data:
